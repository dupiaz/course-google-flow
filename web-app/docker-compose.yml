services:
  # Production service (use: docker compose up web --build)
  web:
    build:
      context: ..
      dockerfile: web-app/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - CONTENT_DIR=/content
    restart: unless-stopped

  # Development service (use: docker compose --profile dev up dev)
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - ..:/content:ro
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CONTENT_DIR=/content
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    profiles:
      - dev
